---
kind: Workflow
metadata:
  generateName: indonesia-coastlines-
  namespace: argo-workflows
spec:
  serviceAccountName: argo-workflows-executor
  entrypoint: coastlines-dag
  parallelism: 120
  podGC:
    strategy: OnPodSuccess
    deleteDelayDuration: 120s
  podMetadata:
    annotations:
      karpenter.sh/do-not-disrupt: 'true'
  nodeSelector:
    data-production: r8xlarge
  tolerations:
    - key: data-production
      operator: Equal
      value: r8xlarge
      effect: NoSchedule
  workflowMetadata:
    labels:
      app: indonesia-coastlines
  arguments:
    parameters:
      - name: image-tag
        value: "0.0.3-12-g5e58708"
      - name: result-version
        value: "0.0.5.all_java"
      - name: tiles-subset
        value: '[\"73,25\",\"74,24\",\"74,25\",\"75,24\",\"75,25\",\"75,26\",\"76,23\",\"76,24\",\"76,26\",\"76,27\",\"77,23\",\"77,24\",\"77,26\",\"77,27\",\"77,28\",\"78,23\",\"78,26\",\"79,23\",\"79,26\",\"80,22\",\"80,23\",\"80,26\",\"81,22\",\"81,23\",\"81,24\",\"81,25\",\"81,26\",\"81,27\",\"82,22\",\"82,23\",\"82,24\",\"82,25\",\"83,22\",\"83,23\",\"83,24\",\"83,25\",\"84,22\",\"84,24\",\"85,22\",\"85,24\",\"85,26\",\"85,27\",\"86,21\",\"86,22\",\"86,24\",\"86,25\",\"86,27\",\"87,21\",\"87,25\",\"88,21\",\"88,24\",\"88,25\",\"89,21\",\"89,24\",\"89,25\",\"90,21\",\"90,24\",\"90,27\",\"91,21\",\"91,22\",\"91,23\",\"91,24\",\"91,27\",\"92,21\",\"92,22\",\"92,23\",\"92,24\",\"93,20\",\"93,21\",\"93,22\",\"93,23\",\"93,24\",\"94,20\",\"94,21\",\"94,22\",\"94,23\",\"94,24\",\"94,27\",\"94,28\",\"95,20\",\"95,24\",\"95,28\",\"96,24\",\"97,24\",\"97,25\",\"98,24\"]' # Can be [] for all tiles or '[\"1965,62\",\"1953,69\"]'
      - name: config
        value: "https://raw.githubusercontent.com/teguhsulistian/indonesia-coastlines/refs/heads/main/configs/indonesia_coastlines_config_testing_ts.yaml"
      - name: overwrite
        value: "--no-overwrite"
  templates:
    - name: coastlines-dag
      dag:
        tasks:
          - name: generate-ids
            template: generate
            arguments:
              parameters:
                - name: config
                  value: "{{workflow.parameters.config}}"
                - name: tiles-subset
                  value: "{{workflow.parameters.tiles-subset}}"

          - name: process-id
            depends: generate-ids.Succeeded
            template: process
            withParam: "{{tasks.generate-ids.outputs.result}}"
            arguments:
              parameters:
                - name: id
                  value: "{{item}}"
                - name: config
                  value: "{{workflow.parameters.config}}"
                - name: result-version
                  value: "{{workflow.parameters.result-version}}"
                - name: overwrite
                  value: "{{workflow.parameters.overwrite}}"

          - name: merge
            depends: "process-id.AnySucceeded"
            template: merge-continental
            arguments:
              parameters:
                - name: config
                  value: "{{workflow.parameters.config}}"
                - name: result-version
                  value: "{{workflow.parameters.result-version}}"

    - name: generate
      inputs:
        parameters:
          - name: config
          - name: tiles-subset
      container:
        image: 686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/coastlines:{{workflow.parameters.image-tag}}
        command: [bash, -c]
        args:
          - >-
            coastlines-print-tiles
            --config-file {{inputs.parameters.config}}
            --config-type coastlines
            --tiles-subset "{{inputs.parameters.tiles-subset}}"

    - name: process
      metadata:
        labels:
          app: "argo-coastlines-process-{{workflow.name}}"
      inputs:
        parameters:
          - name: id
          - name: config
          - name: result-version
          - name: overwrite
      # retryStrategy:
      #   limit: 2
      #   retryPolicy: Always
      container:
        image: 686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/coastlines:{{workflow.parameters.image-tag}}
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: 40Gi
            cpu: 8.0
          limits:
            cpu: 16.0
            memory: 80Gi
        command: [bash, -c]
        args:
          - |
            set -xe

            echo "Downloading tide model"
            wget -qq https://s3.ap-southeast-3.amazonaws.com/piksel-staging-public-data/ls_coastlines/indo_tide_models.zip \
              -O /tmp/tide_models.zip && \
            unzip -qq /tmp/tide_models.zip -d /tmp/tide_models_temp &&
            mv /tmp/tide_models_temp /tmp/tide_models

            echo "Running coastlines"
            coastlines-combined \
              --config-path={{inputs.parameters.config}} \
              --study-area={{inputs.parameters.id}} \
              --tide-data-location="/tmp/tide_models/" \
              --output-version={{inputs.parameters.result-version}} \
              {{inputs.parameters.overwrite}}
        env:
          - name: ODC_DEFAULT_DB_HOSTNAME
            value: pg-proxy-service.database.svc.cluster.local
          - name: ODC_DEFAULT_DB_PORT
            value: '6432'
          - name: ODC_DEFAULT_DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: odc
                key: username
          - name: ODC_DEFAULT_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: odc
                key: password
          - name: ODC_DEFAULT_DB_DATABASE
            valueFrom:
              secretKeyRef:
                name: odc
                key: username
          - name: ODC_DEFAULT_INDEX_DRIVER
            value: postgis

    - name: merge-continental
      metadata:
        labels:
          app: "argo-coastlines-merge-{{workflow.name}}"
      inputs:
        parameters:
          - name: config
          - name: result-version
      container:
        image: 686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/coastlines:{{workflow.parameters.image-tag}}
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: 32Gi
            cpu: 4.0
          limits:
            cpu: 8.0
            memory: 40Gi
        command: [bash, -c]
        args:
          - |
            coastlines-merge \
              --config-path={{inputs.parameters.config}} \
              --output-version={{inputs.parameters.result-version}}