---
kind: Workflow
metadata:
  generateName: indonesia-coastlines-
  namespace: argo-workflows
spec:
  serviceAccountName: argo-workflows-executor
  entrypoint: coastlines-dag
  parallelism: 120
  podGC:
    strategy: OnPodSuccess
    deleteDelayDuration: 120s
  podMetadata:
    annotations:
      karpenter.sh/do-not-disrupt: 'true'
  nodeSelector:
    data-production: r8xlarge
  tolerations:
    - key: data-production
      operator: Equal
      value: r8xlarge
      effect: NoSchedule
  workflowMetadata:
    labels:
      app: indonesia-coastlines

  volumes:
    - name: efs-coastlines-data
      persistentVolumeClaim:
        claimName: efs-coastlines-data

  arguments:
    parameters:
      - name: image-tag
        value: "0.0.3-22-g364d1d6"
      - name: result-version
        value: "0.0.5"
      - name: tiles-subset
        # value: '[\"76,34\"]' # Can be [] for all tiles or '[\"1965,62\",\"1953,69\"]'
        # value: '[]'
        value: '[\"85,27\",\"86,27\",\"85,26\"]'
      - name: config
        value: "https://raw.githubusercontent.com/piksel-ina/indonesia-coastlines/refs/heads/main/configs/indonesia_coastlines_config_mndwi_nir_50.yaml"
      - name: overwrite
        value: "--no-overwrite"
  templates:
    - name: coastlines-dag
      dag:
        tasks:
          - name: generate-ids
            template: generate
            arguments:
              parameters:
                - name: config
                  value: "{{workflow.parameters.config}}"
                - name: tiles-subset
                  value: "{{workflow.parameters.tiles-subset}}"

          - name: process-id
            depends: generate-ids.Succeeded
            template: process
            withParam: "{{tasks.generate-ids.outputs.result}}"
            arguments:
              parameters:
                - name: id
                  value: "{{item}}"
                - name: config
                  value: "{{workflow.parameters.config}}"
                - name: result-version
                  value: "{{workflow.parameters.result-version}}"
                - name: overwrite
                  value: "{{workflow.parameters.overwrite}}"

          - name: merge
            depends: "process-id.AnySucceeded"
            template: merge-continental
            arguments:
              parameters:
                - name: config
                  value: "{{workflow.parameters.config}}"
                - name: result-version
                  value: "{{workflow.parameters.result-version}}"

    - name: generate
      inputs:
        parameters:
          - name: config
          - name: tiles-subset
      container:
        image: 686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/coastlines:{{workflow.parameters.image-tag}}
        command: [bash, -c]
        args:
          - >-
            coastlines-print-tiles
            --config-file {{inputs.parameters.config}}
            --config-type coastlines
            --tiles-subset "{{inputs.parameters.tiles-subset}}"

    - name: process
      metadata:
        labels:
          app: "argo-coastlines-process-{{workflow.name}}"
      inputs:
        parameters:
          - name: id
          - name: config
          - name: result-version
          - name: overwrite
      # retryStrategy:
      #   limit: 2
      #   retryPolicy: Always
      container:
        image: 686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/coastlines:{{workflow.parameters.image-tag}}
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: 120Gi
            cpu: 14.0
          limits:
            cpu: 16.0
            memory: 140Gi
        
        volumeMounts:
          - name: efs-coastlines-data
            mountPath: /data/coastlines
            readOnly: true

        command: [bash, -c]
        args:
          - |
            set -xe

            echo "Running coastlines"
            coastlines-combined \
              --config-path={{inputs.parameters.config}} \
              --study-area={{inputs.parameters.id}} \
              --tide-data-location="/data/coastlines/tide_models/" \
              --output-version={{inputs.parameters.result-version}} \
              {{inputs.parameters.overwrite}}
        env:
          - name: ODC_DEFAULT_DB_HOSTNAME
            value: pg-proxy-service.database.svc.cluster.local
          - name: ODC_DEFAULT_DB_PORT
            value: '6432'
          - name: ODC_DEFAULT_DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: odc
                key: username
          - name: ODC_DEFAULT_DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: odc
                key: password
          - name: ODC_DEFAULT_DB_DATABASE
            valueFrom:
              secretKeyRef:
                name: odc
                key: username
          - name: ODC_DEFAULT_INDEX_DRIVER
            value: postgis

    - name: merge-continental
      metadata:
        labels:
          app: "argo-coastlines-merge-{{workflow.name}}"
      inputs:
        parameters:
          - name: config
          - name: result-version
      container:
        image: 686410905891.dkr.ecr.ap-southeast-3.amazonaws.com/coastlines:{{workflow.parameters.image-tag}}
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: 32Gi
            cpu: 4.0
          limits:
            cpu: 8.0
            memory: 40Gi
        command: [bash, -c]
        args:
          - |
            coastlines-merge \
              --config-path={{inputs.parameters.config}} \
              --output-version={{inputs.parameters.result-version}}
